name: Default branch instructions mode smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Seed proxy server info fixture
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/codex-home"
          printf '{"port": 1}\n' > "$RUNNER_TEMP/codex-home/${GITHUB_RUN_ID}.json"
          printf 'preseeded smoke output\n' > "$RUNNER_TEMP/last-message.md"

      - name: Run action in trusted default-branch mode
        uses: caseysilver-oai/codex-action@caseysilver/trusted-project-instructions-mode
        with:
          prompt: "smoke test"
          codex-home: ${{ runner.temp }}/codex-home
          codex-args: --help
          project-instructions-mode: default-branch
          output-file: ${{ runner.temp }}/last-message.md

      - name: Verify trusted instructions and hardened exec flags
        shell: bash
        run: |
          grep -F "Trusted default-branch smoke instructions" "$RUNNER_TEMP/codex-home/AGENTS.override.md"
          grep -F "preseeded smoke output" "$RUNNER_TEMP/last-message.md"
